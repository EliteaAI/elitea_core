[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*

markers =
    unit: Pure unit tests with no external dependencies
    integration: Tests requiring database or runtime
    slow: Tests that take > 1 second
    db: Tests requiring database access
    pylon: Tests requiring Pylon runtime
    api: API endpoint tests
    rpc: RPC method tests
    models: Model validation tests
    utils: Utility function tests

addopts =
    --verbose
    --strict-markers
    --tb=short
    -ra

pythonpath = .